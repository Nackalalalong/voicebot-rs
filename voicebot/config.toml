[server]
host = "0.0.0.0"
port = 8080

[session_defaults]
language = "auto"
asr_provider = "speaches"
tts_provider = "speaches"
llm_provider = "openai"

[vad]
silence_ms = 800
min_speech_ms = 200
energy_threshold = 0.02

[asr]
primary = "speaches"
# fallback = "whisper"

[asr.whisper]
model_path = "./models/ggml-base.bin"

[llm]
primary = "openai"
# fallback = "anthropic"

[llm.openai]
base_url = "http://localhost:11434"
api_key = "ollama"
model = "qwen3.5:9b"
max_tokens = 512
temperature = 0.7

[llm.anthropic]
api_key = "${ANTHROPIC_API_KEY}"
model = "claude-opus-4-6"

[tts.coqui]
model_path = "./models/tts_model.pth"

[asr.speaches]
base_url = "http://localhost:8000"
# api_key = "${SPEACHES_API_KEY}"
model = "Systran/faster-whisper-tiny"
language = "en"

[tts.speaches]
base_url = "http://localhost:8000"
# api_key = "${SPEACHES_API_KEY}"
model = "speaches-ai/Kokoro-82M-v1.0-ONNX"
voice = "af_heart"

[channels]
audio_ingress_capacity = 50
event_bus_capacity = 200

# Uncomment to enable Asterisk ARI transport.
# audio_host must be reachable FROM Asterisk (not 127.0.0.1 if Asterisk is in Docker).
# [asterisk]
# ari_host = "localhost"
# ari_port = 8088
# username = "voicebot"
# password = "secret"
# app_name = "voicebot"
# audio_host = "192.168.1.10"   # host IP reachable from Asterisk
