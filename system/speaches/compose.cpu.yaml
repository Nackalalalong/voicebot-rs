services:
    speaches:
        extends:
            file: compose.yaml
            service: speaches
        image: ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cpu
        build:
            args:
                BASE_IMAGE: ubuntu:24.04
        user: root
        volumes:
            - ${HOME}/.cache/huggingface/hub:/home/ubuntu/.cache/huggingface/hub
volumes: {}
