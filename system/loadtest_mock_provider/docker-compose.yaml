# Loadtest infrastructure: Asterisk + voicebot + mock AI provider.
#
# voicebot runs inside the same Docker network as Asterisk so external-media RTP
# does not cross the WSL2 host boundary.
#
# Usage (from project root):
#   docker compose -f system/loadtest_mock_provider/docker-compose.yaml up -d

services:
    # ── Asterisk PBX ──────────────────────────────────────────────────────────
    asterisk:
        extends:
            file: ../asterisk/docker-compose.yaml
            service: tele
        volumes:
            - ../asterisk/etc:/srv/etc/asterisk
            - ./asterisk/pjsip_transport.conf:/srv/etc/asterisk/pjsip_transport.conf:ro

    # ── Mock ASR / LLM / TTS provider ─────────────────────────────────────────
    mock-provider:
        build:
            context: ../../voicebot
            dockerfile: ../system/loadtest_mock_provider/mock-provider/Dockerfile
        container_name: mock-provider
        network_mode: service:asterisk
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'curl', '--fail', 'http://localhost:8000/health']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 5s

    # ── voicebot server / ARI transport ──────────────────────────────────────
    voicebot:
        build:
            context: ../../voicebot
            dockerfile: Dockerfile
        container_name: loadtest-voicebot
        restart: unless-stopped
        network_mode: service:asterisk
        depends_on:
            asterisk:
                condition: service_started
            mock-provider:
                condition: service_healthy
        volumes:
            - ./config.voicebot.docker.toml:/etc/voicebot/config.toml:ro

volumes:
    # Required by the extended asterisk service
    tele-conf:
