; Loadtest-specific transport override.
; Docker Desktop on WSL2 isolates container IPs from the host process space,
; so advertise the WSL host IP for SIP/SDP media instead of the container IP.

[t_wan](!)
type = transport
bind = 0.0.0.0:5060
tos = cs3
cos = 3
external_signaling_address = 192.168.1.110
external_media_address = 192.168.1.110

[udp](t_wan)
protocol = udp

[tcp](t_wan)
protocol = tcp

[tls](t_wan)
bind = 0.0.0.0:5061
cert_file = /etc/ssl/asterisk/cert.pem
priv_key_file = /etc/ssl/asterisk/priv_key.pem
protocol = tls
method=tlsv1_2