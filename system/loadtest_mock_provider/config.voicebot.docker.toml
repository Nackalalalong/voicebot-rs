[server]
host = "0.0.0.0"
port = 8080

[session_defaults]
language = "en"
asr_provider = "speaches"
tts_provider = "speaches"
llm_provider = "openai"

[vad]
silence_ms = 300
min_speech_ms = 200
energy_threshold = 0.001

[asr]
primary = "speaches"

[asr.speaches]
base_url = "http://localhost:8000"
model = "mock-asr"
language = "en"

[llm]
primary = "openai"

[llm.openai]
base_url = "http://localhost:8000"
api_key = "mock"
model = "mock-llm"
max_tokens = 64
temperature = 0.0

[tts.speaches]
base_url = "http://localhost:8000"
model = "mock-tts"
voice = "af_heart"

[channels]
audio_ingress_capacity = 50
event_bus_capacity = 200

[asterisk]
ari_host = "127.0.0.1"
ari_port = 8088
username = "voicebot"
password = "voicebot"
app_name = "voicebot"
audio_host = "127.0.0.1"
