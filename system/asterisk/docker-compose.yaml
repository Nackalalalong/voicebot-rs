services:
    tele:
        image: mlan/asterisk
        network_mode: bridge # Only here to help testing
        cap_add:
            - sys_ptrace # Only here to help testing
            - net_admin # Allow NFT, used by AutoBan
            - net_raw # Allow NFT, used by AutoBan
        ports:
            - '5059:${WEBSMSD_PORT:-80}' # WEBSMSD port mapping
            - '5060:5060/udp' # SIP UDP port
            - '5060:5060' # SIP TCP port
            - '5061:5061' # SIP TLS port
            - '8088:8088' # ARI HTTP and WebSocket
            - '10000-10099:10000-10099/udp' # RTP ports
        environment:
            - SYSLOG_LEVEL=${SYSLOG_LEVEL-4} # Logging
            - HOSTNAME=${TELE_SRV-tele}.${DOMAIN-docker.localhost}
            - PULSE_SERVER=unix:/run/pulse/socket # Use host audio
            - PULSE_COOKIE=/run/pulse/cookie # Use host audio
            - WEBSMSD_PORT=${WEBSMSD_PORT-80} # WEBSMSD internal port
        volumes:
            - tele-conf:/srv # Persistent storage
            - ./etc:/srv/etc/asterisk # Local Asterisk configuration
            - ./pulse:/run/pulse # Use host audio
            - /etc/localtime:/etc/localtime:ro # Use host timezone

    # ── Prometheus (optional — --profile monitoring) ───────────────────────────
    # Runs on the host network so it can scrape:
    #   localhost:8088  — Asterisk ARI (requires asterisk-exporter or /ari scrape)
    #   localhost:8081  — voicebot metrics (when voicebot runs alongside Asterisk)
    # Prometheus UI: http://localhost:${MONITORING_PROMETHEUS_PORT:-9093}
    prometheus:
        image: prom/prometheus:v3.3.1
        profiles: ['monitoring']
        network_mode: host
        restart: unless-stopped
        command:
            - '--config.file=/etc/prometheus/prometheus.yaml'
            - '--storage.tsdb.path=/prometheus'
            - '--web.listen-address=:${MONITORING_PROMETHEUS_PORT:-9093}'
            - '--storage.tsdb.retention.time=7d'
            - '--web.enable-lifecycle'
        volumes:
            - ./monitoring/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
            - asterisk-prometheus-data:/prometheus

volumes:
    tele-conf: # Persistent storage
    asterisk-prometheus-data:
