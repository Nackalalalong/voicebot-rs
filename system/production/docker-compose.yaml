services:
    # ─── PostgreSQL ────────────────────────────────────────────────────────────
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: voicebot
            POSTGRES_USER: voicebot
            POSTGRES_PASSWORD: voicebot_dev
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - '5432:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U voicebot']
            interval: 5s
            timeout: 5s
            retries: 10

    # ─── Redis ─────────────────────────────────────────────────────────────────
    redis:
        image: redis:7-alpine
        command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
        ports:
            - '6379:6379'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 10

    # ─── RustFS / MinIO (S3-compatible object storage) ─────────────────────────
    # Use RustFS for dev. Swap image for minio/minio in production.
    minio:
        image: minio/minio:latest
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        volumes:
            - minio_data:/data
        ports:
            - '9000:9000'
            - '9001:9001'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
            interval: 10s
            timeout: 5s
            retries: 10

    # MinIO bucket initialisation
    minio-init:
        image: minio/mc:latest
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
              mc alias set local http://minio:9000 minioadmin minioadmin &&
              mc mb --ignore-existing local/voicebot &&
              mc anonymous set download local/voicebot
            "

        restart: on-failure

    # ─── Management API ────────────────────────────────────────────────────────
    api:
        build:
            context: ../../voicebot
            dockerfile: Dockerfile
            target: api
        environment:
            DATABASE_URL: postgresql://voicebot:voicebot_dev@postgres:5432/voicebot
            REDIS_URL: redis://redis:6379
            JWT_SECRET: change-this-in-production-min-32-chars
            S3_ENDPOINT_URL: http://minio:9000
            S3_ACCESS_KEY: minioadmin
            S3_SECRET_KEY: minioadmin
            S3_BUCKET: voicebot
            BIND_ADDR: '0.0.0.0:8080'
            RUST_LOG: 'info,api=debug'
        ports:
            - '8080:8080'
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            minio:
                condition: service_healthy
        restart: unless-stopped

    # ─── Voicebot Core (real-time voice engine) ─────────────────────────────────
    voicebot-core:
        build:
            context: ../../voicebot
            dockerfile: Dockerfile
            target: server
        environment:
            RUST_LOG: 'info,server=debug'
            CONFIG_PATH: /app/config.toml
        volumes:
            - ../../voicebot/config.toml:/app/config.toml:ro
        ports:
            - '8090:8090'
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped

    # ─── Campaign Scheduler ────────────────────────────────────────────────────
    scheduler:
        build:
            context: ../../voicebot
            dockerfile: Dockerfile
            target: scheduler
        environment:
            DATABASE_URL: postgresql://voicebot:voicebot_dev@postgres:5432/voicebot
            REDIS_URL: redis://redis:6379
            RUST_LOG: 'info,scheduler=debug'
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped

    # ─── Next.js Dashboard ────────────────────────────────────────────────────
    dashboard:
        build:
            context: ../../dashboard
            dockerfile: Dockerfile
        environment:
            BACKEND_URL: http://api:8080
            JWT_SECRET: change-this-in-production-min-32-chars
            NODE_ENV: production
        ports:
            - '3000:3000'
        depends_on:
            - api
        restart: unless-stopped

volumes:
    postgres_data:
    minio_data:
