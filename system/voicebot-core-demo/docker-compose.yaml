# Voicebot Core Demo — Docker Compose
# Usage:  docker compose up --build
#         OPENAI_API_KEY=sk-xxx docker compose up --build
#
# Services:
#   speaches  — ASR / TTS / LLM (OpenAI-compatible)  :8000
#   voicebot  — WebSocket voice pipeline              :8080  metrics :8081
#   web       — Static demo UI served by nginx        :3000
#
# With in-stack monitoring (Prometheus + Grafana):
#   docker compose --profile monitoring up --build
#   Prometheus: http://localhost:${MONITORING_PROMETHEUS_PORT:-9091}
#   Grafana:    http://localhost:${MONITORING_GRAFANA_PORT:-3031}

services:
    # ── Speaches (ASR + TTS + OpenAI-compatible chat) ─────────────────────────
    speaches:
        extends:
            file: ../speaches/compose.cpu.yaml
            service: speaches
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'curl', '--fail', 'http://localhost:8000/health']
            interval: 10s
            timeout: 5s
            retries: 6
            start_period: 10s
        networks:
            - voicebot-net

    # ── Voicebot server ────────────────────────────────────────────────────────
    voicebot:
        build:
            context: ../../voicebot
            dockerfile: Dockerfile
        restart: unless-stopped
        ports:
            - '${VOICEBOT_PORT:-8080}:8080'
            - '${VOICEBOT_METRICS_PORT:-8081}:8081'
        volumes:
            - ./config.docker.toml:/etc/voicebot/config.toml:ro
        environment:
            - RUST_LOG=${RUST_LOG:-info,voicebot_core=debug,asr=debug,tts=debug,agent=debug}
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        depends_on:
            speaches:
                condition: service_healthy
        networks:
            - voicebot-net

    # ── Web demo (static files via nginx) ─────────────────────────────────────
    web:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - '${WEB_PORT:-3000}:80'
        volumes:
            - .:/usr/share/nginx/html:ro
        depends_on:
            - voicebot
        networks:
            - voicebot-net

    # ── In-stack Prometheus (optional — --profile monitoring) ─────────────────
    prometheus:
        image: prom/prometheus:v3.3.1
        profiles: ['monitoring']
        restart: unless-stopped
        command:
            - '--config.file=/etc/prometheus/prometheus.yaml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=7d'
            - '--web.enable-lifecycle'
        ports:
            - '${MONITORING_PROMETHEUS_PORT:-9091}:9090'
        volumes:
            - ./monitoring/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
            - demo-prometheus-data:/prometheus
        networks:
            - voicebot-net

    # ── In-stack Grafana (optional — --profile monitoring) ────────────────────
    grafana:
        image: grafana/grafana:12.2.0
        profiles: ['monitoring']
        restart: unless-stopped
        ports:
            - '${MONITORING_GRAFANA_PORT:-3031}:3000'
        volumes:
            - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
            - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
            - demo-grafana-data:/var/lib/grafana
        environment:
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
            - GF_AUTH_DISABLE_LOGIN_FORM=true
            - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/voicebot.json
        depends_on:
            - prometheus
        networks:
            - voicebot-net

networks:
    voicebot-net:
        driver: bridge

volumes:
    demo-prometheus-data:
    demo-grafana-data:

volumes:
    demo-prometheus-data:
    demo-grafana-data:
