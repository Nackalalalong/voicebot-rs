# Voicebot Core WebSocket Load Test
#
# Runs voicebot-server + mock AI provider in Docker.
# The loadtest runner also runs in Docker and talks to voicebot over the
# internal compose network — no Asterisk, no SIP, no RTP.
#
# Stack:
#   [loadtest runner (Docker)] → ws://voicebot:8080/session
#                                      ↓
#                           [voicebot-server (Docker):8080]
#                                      ↓ HTTP
#                           [mock-provider (Docker):8000]
#                              ASR · LLM · TTS stubs
#
# Usage (from project root):
#   docker compose -f system/loadtest_voicebot_core/docker-compose.yaml up -d --build voicebot mock-provider
#   docker compose -f system/loadtest_voicebot_core/docker-compose.yaml --profile loadtest run --rm loadtest

services:
    # ── Mock ASR / LLM / TTS provider ─────────────────────────────────────────
    mock-provider:
        build:
            context: ../../voicebot
            dockerfile: ../system/loadtest_mock_provider/mock-provider/Dockerfile
        container_name: ws-loadtest-mock-provider
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'curl', '--fail', 'http://localhost:8000/health']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 5s
        networks:
            - ws-loadtest-net

    # ── Voicebot server (WebSocket transport) ─────────────────────────────────
    voicebot:
        build:
            context: ../../voicebot
            dockerfile: Dockerfile
        container_name: ws-loadtest-voicebot
        restart: unless-stopped
        ports:
            - '${VOICEBOT_PORT:-18080}:8080'
            - '${VOICEBOT_METRICS_PORT:-18081}:8081'
        healthcheck:
            test: ['CMD-SHELL', 'nc -z 127.0.0.1 8080']
            interval: 2s
            timeout: 1s
            retries: 30
            start_period: 3s
        volumes:
            - ./config.voicebot.toml:/etc/voicebot/config.toml:ro
        environment:
            - RUST_LOG=${RUST_LOG:-info}
        depends_on:
            mock-provider:
                condition: service_healthy
        networks:
            - ws-loadtest-net

    loadtest:
        build:
            context: ../../voicebot
            dockerfile: ../system/loadtest_voicebot_core/Dockerfile.loadtest
        profiles: ['loadtest']
        restart: 'no'
        working_dir: /workspace
        command: ['/etc/voicebot-loadtest/loadtest.toml']
        volumes:
            - ./loadtest.toml:/etc/voicebot-loadtest/loadtest.toml:ro
            - ../../voicebot/artifacts:/workspace/artifacts
        environment:
            - RUST_LOG=${LOADTEST_RUST_LOG:-info}
        depends_on:
            mock-provider:
                condition: service_healthy
            voicebot:
                condition: service_healthy
        networks:
            - ws-loadtest-net

    # ── In-stack Prometheus (optional) ────────────────────────────────────────
    # Scrapes voicebot metrics directly by service name inside ws-loadtest-net.
    # Start with: --profile monitoring
    # Prometheus UI: http://localhost:${MONITORING_PROMETHEUS_PORT:-19090}
    prometheus:
        image: prom/prometheus:v3.3.1
        profiles: ['monitoring']
        restart: unless-stopped
        command:
            - '--config.file=/etc/prometheus/prometheus.yaml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=2d'
            - '--web.enable-lifecycle'
        ports:
            - '${MONITORING_PROMETHEUS_PORT:-19090}:9090'
        volumes:
            - ./monitoring/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
            - ws-loadtest-prometheus-data:/prometheus
        depends_on:
            voicebot:
                condition: service_healthy
        networks:
            - ws-loadtest-net

    # ── In-stack Grafana (optional) ───────────────────────────────────────────
    # Grafana UI: http://localhost:${MONITORING_GRAFANA_PORT:-13030}
    grafana:
        image: grafana/grafana:12.2.0
        profiles: ['monitoring']
        restart: unless-stopped
        ports:
            - '${MONITORING_GRAFANA_PORT:-13030}:3000'
        volumes:
            - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
            - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
            - ws-loadtest-grafana-data:/var/lib/grafana
        environment:
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
            - GF_AUTH_DISABLE_LOGIN_FORM=true
            - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/voicebot.json
        depends_on:
            - prometheus
        networks:
            - ws-loadtest-net

networks:
    ws-loadtest-net:
        driver: bridge

volumes:
    ws-loadtest-prometheus-data:
    ws-loadtest-grafana-data:
