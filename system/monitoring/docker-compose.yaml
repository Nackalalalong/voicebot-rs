# Central monitoring stack — Prometheus + Grafana
#
# Scrapes voicebot metrics from all running stacks via host.docker.internal.
# Start this alongside any other stack to observe metrics in real time.
#
# Stack metrics endpoints (must be running):
#   voicebot-core-demo       → host.docker.internal:8081
#   loadtest_voicebot_core   → host.docker.internal:18081
#   loadtest_mock_provider   → host.docker.internal:18082
#
# Usage (from project root):
#   docker compose -f system/monitoring/docker-compose.yaml up -d
#
# Prometheus:  http://localhost:9090
# Grafana:     http://localhost:3030  (anonymous admin, no login)
#
# Override ports via env:
#   PROMETHEUS_PORT=9091 GRAFANA_PORT=3031 docker compose -f ... up -d

services:
    prometheus:
        image: prom/prometheus:v3.3.1
        container_name: voicebot-prometheus
        restart: unless-stopped
        command:
            - '--config.file=/etc/prometheus/prometheus.yaml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=7d'
            - '--web.enable-lifecycle'
        ports:
            - '${PROMETHEUS_PORT:-9090}:9090'
        volumes:
            - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
            - prometheus-data:/prometheus
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--no-verbose',
                    '--tries=1',
                    '--spider',
                    'http://localhost:9090/-/healthy',
                ]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 5s

    grafana:
        image: grafana/grafana:12.2.0
        container_name: voicebot-grafana
        restart: unless-stopped
        ports:
            - '${GRAFANA_PORT:-3030}:3000'
        volumes:
            - ./grafana/provisioning:/etc/grafana/provisioning:ro
            - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
            - grafana-data:/var/lib/grafana
        environment:
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
            - GF_AUTH_DISABLE_LOGIN_FORM=true
            - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/voicebot.json
        depends_on:
            prometheus:
                condition: service_healthy
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--no-verbose',
                    '--tries=1',
                    '--spider',
                    'http://localhost:3000/api/health',
                ]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s

volumes:
    prometheus-data:
    grafana-data:
